name: Test
on:
  workflow_call:

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'min'
          - 'lts'
          - '1' # Leave this line unchanged. '1' will automatically expand to the latest stable 1.x release of Julia.
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        id: runtests
      - name: Filter to only failed reference images
        if: failure() && steps.runtests.outcome == 'failure'
        run: julia tooling/ci/filter_failed_reference_images.jl
      - name: Upload failed reference images
        if: failure() && steps.runtests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: failed-reference-images-${{ matrix.version }}
          path: test/reference_tests/*.png
          if-no-files-found: ignore
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
